[pytest]
testpaths = tests
python_files = test_*.py
addopts = -ra --strict-markers --tb=short
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    phase1: Phase 1 pipeline tests
    phase2: Phase 2 regime/classifier tests
    phase3: Phase 3 backtest tests
    phase4: Phase 4 Pine Script static tests
    smoke: end-to-end integration smoke tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::FutureWarning
asyncio_mode = auto
